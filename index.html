<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP: Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="header">
        <div>
            <img src="icons/bookshelf.svg" alt="">
            <p>My Library</p>
        </div>
        <button class="add-book">+ Add a Book</button>
        <dialog class="add-book-modal" id="modal">
            <div class="modal-header">
                <h2>Add a book:</h2>
                <button class="close-book-modal">X</button>
            </div>
            <form class="modal-content" method="dialog">
                <div class="form-row">
                    <label for="book-title">Title: </label>
                    <input type="text" name="book-title">
                </div>
                <div class="form-row">
                    <label for="book-author">Author: </label>
                    <input type="text" name="book-author">
                </div>
                <div class="form-row">
                    <label for="book-year">Year: </label>
                    <input type="number" name="book-year">
                </div>
                <div class="form-row">
                    <label for="book-pages">Pages: </label>
                    <input type="number" name="book-pages">
                </div>
                <div class="form-row">
                    <input type="checkbox" name="book-read">I have finished reading the book.
                </div>
                <div class="form-submit">
                    <button class="submit-book-btn">Submit</button>
                </div>
            </form>
        </dialog>
    </div>
    <div class="books-container">
    </div>
</body>
</html>
